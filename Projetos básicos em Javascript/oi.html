<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capa Oficial - Dados Livres</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container 16:9 Limpo e Institucional */
        .slide-card {
            width: 100vw;
            height: 56.25vw;
            max-width: 1920px;
            max-height: 1080px;
            background-color: #ffffff;
            position: relative;
            padding: 6% 8%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        /* Barra Lateral Verde - Identidade IFRN */
        .slide-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 15px;
            height: 100%;
            background-color: #009639; /* Verde Oficial do IF */
        }

        /* Marca d'água sutil que remete a dados/tabelas organizadas */
        .data-grid-overlay {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            opacity: 0.6;
            pointer-events: none;
        }

        /* Cabeçalho */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #64748b;
            z-index: 2;
        }

        .badge-if {
            background-color: #009639;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.9rem;
        }

        /* Bloco do Título Principal */
        .content {
            z-index: 2;
            margin-top: -4%;
        }

        .project-tag {
            display: inline-block;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #009639;
            margin-bottom: 16px;
            border-left: 3px solid #009639;
            padding-left: 10px;
        }

        .title {
            font-size: 5.5rem;
            font-weight: 800;
            line-height: 1.1;
            color: #0f172a;
            letter-spacing: -2px;
        }

        .title span {
            color: #009639;
        }

        .subtitle {
            font-size: 1.5rem;
            font-weight: 400;
            color: #475569;
            margin-top: 24px;
            max-width: 75%;
            line-height: 1.5;
        }

        /* Rodapé Simplificado */
        .footer {
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 24px;
        }

        .info-block {
            font-size: 1rem;
            color: #64748b;
        }

        .info-block strong {
            color: #0f172a;
        }
    </style>
</head>
<body>

    <div class="slide-card">
        <div class="data-grid-overlay"></div>

        <div class="header">
            <span class="badge-if">IFRN</span>
            <span>Campus Natal-Zona Norte</span>
        </div>

        <div class="content">
            <span class="project-tag">Plataforma de Transparência Pública</span>
            <h1 class="title">Dados <span>Livres</span>.</h1>
            <p class="subtitle">Catalogação de dados abertos governamentais e incentivo ao controle social através do desenvolvimento web.</p>
        </div>

        <div class="footer">
            <div class="info-block">
                Linha de Pesquisa: <strong>Desenvolvimento Tecnológico</strong>
            </div>
            <div class="info-block">
                Orientação: <strong>Prof. Pedro Baesse</strong>
            </div>
        </div>
    </div>

</body>
</html>
