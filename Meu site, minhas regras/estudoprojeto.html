<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"> <meta http-equiv="X-UA-Compatible" content="IE=edge"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Arthur Kauã - Portfólio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Great+Vibes&family=Open+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1 class="nome-assinatura">Arthur Kauã</h1>
            <p class="slogan-ouro">Win and win</p>
        </div>
    </header>
    <div class="transition"></div>
    <section class="quem-sou" id="sobre">
        <div class="container-flex">
            <div class="texto-apresentacao">
                <h2 class="titulo-sessao">Quem sou?</h2>
                <p>Meu nome é Arthur, Arthur Kauã um completo apaixonado por futebol, videogames, estudar, pagode e outras coisas que definem o que sou. Além de ser apaixonado por um tal de Cristiano Ronaldo.</p>
            </div>
            <div class="foto-destaque">
                <img src="img.img/ronaldo.jpg" alt="CR7 Manchester United">
            </div>
        </div>
    </section>
    

    <section class="porque-cr7">
        <h2 class="titulo-sessao">Porque o CR7?</h2>
        <div class="grid-motivos">
            <div class="card-motivo">
                <img src="img.img/ronaldooo.jpg" alt="Foco">
                <h3>FOCO</h3>
            </div>
            <div class="card-motivo">
                <img src="img.img/cr7.png" alt="Vencer">
                <h3>VENCER</h3>
            </div>
            <div class="card-motivo">
                <img src="img.img/cristi.jpg" alt="GOAT">
                <h3>G.O.A.T</h3>
            </div>
        </div>
    </section>
</body>
</html>
